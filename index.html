<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Booking Template</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="wrap nav-inner">
    <a href="#" class="wordmark" id="wordmark"></a>
    <div class="links" id="nav-links"></div>
  </div>
</nav>

<header class="hero">
  <div class="wrap hero-inner">
    <div class="hero-copy">
      <p class="eyebrow" id="hero-eyebrow"></p>
      <h1 id="hero-headline"></h1>
      <p class="subhead" id="hero-subhead"></p>
      <div class="cta-row">
        <a class="btn btn-primary" id="hero-cta-primary" href="#"></a>
        <a class="btn btn-secondary" id="hero-cta-secondary" href="#"></a>
      </div>
    </div>
    <div class="breath-wrap" aria-hidden="true">
      <div class="breath-ring r3"></div>
      <div class="breath-ring r2"></div>
      <div class="breath-circle" id="breath-circle">
        <span id="breath-label"></span>
      </div>
    </div>
  </div>
</header>

<main>

  <section id="sessions" class="section">
    <div class="wrap">
      <h2 id="sessions-heading"></h2>
      <p class="section-sub" id="sessions-sub"></p>
      <div class="cards" id="sessions-cards"></div>
    </div>
  </section>

  <section id="about" class="section about">
    <div class="wrap about-grid">
      <div class="about-text">
        <h2 id="about-heading"></h2>
        <div id="about-paragraphs"></div>
      </div>
      <ul class="credentials" id="about-credentials"></ul>
    </div>
  </section>

  <section class="section quote-section">
    <div class="wrap">
      <blockquote class="quote" id="quote-text"></blockquote>
      <p class="quote-attr" id="quote-attr"></p>
    </div>
  </section>

  <section id="booking" class="section booking">
    <div class="wrap">
      <h2 id="booking-heading"></h2>
      <p class="section-sub" id="booking-sub"></p>
      <div id="booking-embed-slot"></div>
    </div>
  </section>

</main>

<footer>
  <div class="wrap">
    <div class="foot-row">
      <span id="footer-contact"></span>
      <div class="foot-links" id="footer-links"></div>
    </div>
    <p class="disclaimer" id="footer-disclaimer"></p>
  </div>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
